<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Second Brain{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    nav a { margin-right: 1rem; }
    form.search { margin: 1rem 0; }
    form.search input[type="text"] { width: 60%; }
    ul { padding-left: 1.2rem; }
    li { margin-bottom: .4rem; }
    .tag {
      display: inline-block;
      background: rgba(128, 128, 128, 0.2);
      border-radius: 3px;
      padding: 0 .4rem;
      margin-right: .25rem;
      font-size: .85em;
    }
    .dangling-link {
      border-bottom: 1px dashed currentColor;
      opacity: 0.7;
    }
    .note-body { white-space: pre-wrap; margin: 1rem 0; }
    .note-id { color: gray; font-size: .85em; }
    .error {
      border: 1px solid #b00020;
      color: #b00020;
      padding: .5rem 1rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('orphans') }}">Orphans</a>
    <a href="{{ url_for('resurface') }}">Resurface</a>
    <a href="{{ url_for('new_note') }}">New note</a>
  </nav>
  <form class="search" action="{{ url_for('search') }}" method="get">
    <input type="text" name="q" placeholder="Search notes..." value="{{ request.args.get('q', '') }}">
    <button type="submit">Search</button>
  </form>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
